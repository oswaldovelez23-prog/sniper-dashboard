<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sniper PRO V2</title>

<link href="https://fonts.cdnfonts.com/css/digital-7-mono" rel="stylesheet">
  
<style>
body{
    margin:0;
    background:#000;
    color:#e5e7eb;
    font-family:Arial;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    align-items:center;
}

/* FRASE */
.phrase{
    font-size:12px;
    color:#4ade80;
    text-align:center;
    padding:8px;
}

/* RELOJ CENTRAL */
.center{
    text-align:center;
}

.main-clock{
    font-family:'Digital-7 Mono';
    font-size:20vw;
    color:#ffd700;
    line-height:1;
}

.main-date{
    font-size:12px;
    color:#6b7280;
}

/* SESIONES */
.sessions{
    width:100%;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:5px;
    padding:5px;
}

.session{
    background:#050505;
    border-radius:8px;
    padding:8px;
    text-align:center;
}

.time{
    font-family:'Digital-7 Mono';
    font-size:6vw;
    color:#ffd700;
}

.date{
    font-size:10px;
    color:#6b7280;
}
</style>
</head>

<body>

<div class="phrase" id="phrase"></div>

<div class="center">
    <div class="main-clock" id="clock"></div>
    <div class="main-date" id="mainDate"></div>
</div>

<div class="sessions">
    <div class="session">
        Tokyo
        <div class="time" id="tokT"></div>
        <div class="date" id="tokD"></div>
    </div>
    <div class="session">
        Sydney
        <div class="time" id="sydT"></div>
        <div class="date" id="sydD"></div>
    </div>
    <div class="session">
        London
        <div class="time" id="lonT"></div>
        <div class="date" id="lonD"></div>
    </div>
    <div class="session">
        New York
        <div class="time" id="nyT"></div>
        <div class="date" id="nyD"></div>
    </div>
</div>

<script>

// FRASES
const phrases=[
"SIN CONFIRMACION NO HAY TRADE",
"NO NECESITO ESTE TRADE",
"EL MERCADO PAGA PACIENCIA",
"PRIMERO MANIPULACION, LUEGO DIRECCION"
];

function updatePhrase(){
    document.getElementById("phrase").textContent=
    phrases[Math.floor(Math.random()*phrases.length)];
}
setInterval(updatePhrase,300000);
updatePhrase();

// RELOJ
function setTime(id,zone){
    document.getElementById(id).textContent=
    new Intl.DateTimeFormat('en-US',{
        timeZone:zone,
        hour:'2-digit',
        minute:'2-digit',
        hour12:false
    }).format(new Date());
}

function setDate(id,zone){
    document.getElementById(id).textContent=
    new Intl.DateTimeFormat('es-CO',{
        timeZone:zone,
        day:'numeric',
        month:'short'
    }).format(new Date());
}

function updateClock(){
    const now=new Date();

    document.getElementById("clock").textContent=
    new Intl.DateTimeFormat('es-CO',{
        hour:'2-digit',
        minute:'2-digit',
        second:'2-digit',
        hour12:false
    }).format(now);

    document.getElementById("mainDate").textContent=
    new Intl.DateTimeFormat('es-CO',{
        weekday:'short',
        day:'numeric',
        month:'short'
    }).format(now);

    setTime("tokT","Asia/Tokyo");
    setTime("sydT","Australia/Sydney");
    setTime("lonT","Europe/London");
    setTime("nyT","America/New_York");

    setDate("tokD","Asia/Tokyo");
    setDate("sydD","Australia/Sydney");
    setDate("lonD","Europe/London");
    setDate("nyD","America/New_York");
}

setInterval(updateClock,1000);
updateClock();

</script>

</body>
</html>

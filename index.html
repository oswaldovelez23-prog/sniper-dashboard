<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sniper Dashboard PRO</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<link href="https://fonts.cdnfonts.com/css/digital-7-mono" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #000;
    color: #e5e7eb;
    font-family: Arial;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    min-height: 100vh;
    padding: 10px;
}

/* FRASE */
.phrase {
    width: 100%;
    font-size: 14px;
    text-align: center;
    color: #4ade80;
}

/* NOTICIAS */
.news {
    width: 100%;
    background: #0a0a0a;
    padding: 8px;
    border-radius: 10px;
    border: 1px solid #7f1d1d;
    text-align: center;
    font-size: 12px;
}

/* CENTRO */
.center {
    text-align: center;
    margin: 20px 0;
}

.main-clock {
    font-family: 'Digital-7 Mono';
    font-size: 18vw;
    color: #ffd700;
}

.main-date {
    color: #6b7280;
    font-size: 14px;
}

.status {
    color: #22c55e;
    font-size: 12px;
}

/* SESIONES */
.sessions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px;
    width: 100%;
}

.session {
    text-align: center;
    padding: 10px;
    background: #050505;
    font-size: 12px;
    border-radius: 8px;
}

.session.active {
    background: #14532d;
}

.time {
    font-family: 'Digital-7 Mono';
    font-size: 6vw;
    color: #ffd700;
}

.date {
    font-size: 10px;
    color: #6b7280;
}
</style>
</head>

<body>

<div class="phrase" id="phrase"></div>

<div class="news">
    <div id="event">Cargando...</div>
    <div id="countdown"></div>
</div>

<div class="center">
    <div class="main-clock" id="clock"></div>
    <div class="main-date" id="mainDate"></div>
    <div class="status" id="status"></div>
</div>

<div class="sessions">
    <div class="session" id="tok">Tokyo<div class="time" id="tokT"></div><div class="date" id="tokD"></div></div>
    <div class="session" id="syd">Sydney<div class="time" id="sydT"></div><div class="date" id="sydD"></div></div>
    <div class="session" id="lon">London<div class="time" id="lonT"></div><div class="date" id="lonD"></div></div>
    <div class="session" id="ny">New York<div class="time" id="nyT"></div><div class="date" id="nyD"></div></div>
</div>

<script>
// FRASES
const phrases = [
"SIN CONFIRMACION NO HAY TRADE",
"NO NECESITO ESTE TRADE",
"PRIMERO MANIPULACION, DESPUES DIRECCION",
"HOY PROTEGER CAPITAL ES GANAR",
"EL TRADE CORRECTO ES ABURRIDO",
"EL MERCADO PAGA PACIENCIA"
];

function updatePhrase(){
    document.getElementById("phrase").textContent =
        phrases[Math.floor(Math.random()*phrases.length)];
}
setInterval(updatePhrase,300000);
updatePhrase();

// RELOJ
function updateClock(){
    const now = new Date();

    document.getElementById("clock").textContent =
        new Intl.DateTimeFormat('es-CO',{
            timeZone:'America/Bogota',
            hour:'2-digit', minute:'2-digit', second:'2-digit',
            hour12:false
        }).format(now);

    document.getElementById("mainDate").textContent =
        new Intl.DateTimeFormat('es-CO',{
            weekday:'long', day:'numeric', month:'long'
        }).format(now);
}
setInterval(updateClock,1000);
updateClock();

// SERVICE WORKER
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
